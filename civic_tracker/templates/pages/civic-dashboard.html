{% extends "templates/web.html" %}

{% block page_content %}
<div class="civic-dashboard">
    <div class="container-fluid">
        <div class="page-header mb-4">
            <h1>Civic Tracker Dashboard</h1>
            <p class="text-muted">Real-time overview of civic issues across all wards</p>
        </div>

        <div class="row mb-4" id="summary-cards">
            <div class="col-md-2">
                <div class="card text-center border-primary">
                    <div class="card-body">
                        <h3 class="text-primary" id="total-issues">-</h3>
                        <p class="text-muted mb-0">Total Issues</p>
                    </div>
                </div>
            </div>
            <div class="col-md-2">
                <div class="card text-center border-warning">
                    <div class="card-body">
                        <h3 class="text-warning" id="open-issues">-</h3>
                        <p class="text-muted mb-0">Open</p>
                    </div>
                </div>
            </div>
            <div class="col-md-2">
                <div class="card text-center border-info">
                    <div class="card-body">
                        <h3 class="text-info" id="assigned-issues">-</h3>
                        <p class="text-muted mb-0">Assigned</p>
                    </div>
                </div>
            </div>
            <div class="col-md-2">
                <div class="card text-center border-primary">
                    <div class="card-body">
                        <h3 class="text-primary" id="progress-issues">-</h3>
                        <p class="text-muted mb-0">In Progress</p>
                    </div>
                </div>
            </div>
            <div class="col-md-2">
                <div class="card text-center border-danger">
                    <div class="card-body">
                        <h3 class="text-danger" id="overdue-issues">-</h3>
                        <p class="text-muted mb-0">Overdue</p>
                    </div>
                </div>
            </div>
            <div class="col-md-2">
                <div class="card text-center border-success">
                    <div class="card-body">
                        <h3 class="text-success" id="resolved-issues">-</h3>
                        <p class="text-muted mb-0">Resolved</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">Issues by Type</h5>
                    </div>
                    <div class="card-body">
                        <canvas id="typeChart" height="250"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">Issues by Status</h5>
                    </div>
                    <div class="card-body">
                        <canvas id="statusChart" height="250"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">Issues by Ward</h5>
                    </div>
                    <div class="card-body">
                        <canvas id="wardChart" height="300"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    loadDashboard();
});

function loadDashboard() {
    frappe.call({
        method: 'civic_tracker.api.dashboard.get_dashboard_stats',
        callback: function(r) {
            if (r.message) {
                renderStats(r.message);
            }
        }
    });
}

function renderStats(data) {
    document.getElementById('total-issues').textContent = data.total_issues;
    document.getElementById('open-issues').textContent = data.total_open;
    document.getElementById('assigned-issues').textContent = data.total_assigned;
    document.getElementById('progress-issues').textContent = data.total_in_progress;
    document.getElementById('overdue-issues').textContent = data.total_overdue;
    document.getElementById('resolved-issues').textContent = data.total_resolved;

    // Issues by Type chart
    if (data.by_type && data.by_type.length) {
        new Chart(document.getElementById('typeChart'), {
            type: 'doughnut',
            data: {
                labels: data.by_type.map(d => d.issue_type),
                datasets: [{
                    data: data.by_type.map(d => d.count),
                    backgroundColor: ['#2490ef', '#ff5858', '#5e64ff', '#ff8c00', '#28a745', '#17a2b8', '#6f42c1', '#fd7e14']
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    // Issues by Status chart
    if (data.by_status && data.by_status.length) {
        new Chart(document.getElementById('statusChart'), {
            type: 'doughnut',
            data: {
                labels: data.by_status.map(d => d.status),
                datasets: [{
                    data: data.by_status.map(d => d.count),
                    backgroundColor: ['#ffc107', '#17a2b8', '#2490ef', '#dc3545', '#28a745', '#6c757d', '#fd7e14']
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    // Issues by Ward chart
    if (data.by_ward && data.by_ward.length) {
        new Chart(document.getElementById('wardChart'), {
            type: 'bar',
            data: {
                labels: data.by_ward.map(d => d.ward),
                datasets: [{
                    label: 'Issues',
                    data: data.by_ward.map(d => d.count),
                    backgroundColor: '#2490ef'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { y: { beginAtZero: true } }
            }
        });
    }
}
</script>

<style>
.civic-dashboard {
    padding: 1rem;
}
.page-header h1 {
    color: #2490ef;
    margin-bottom: 0.25rem;
}
.card {
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    margin-bottom: 1rem;
}
.card h3 {
    font-size: 2rem;
    font-weight: 700;
}
</style>
{% endblock %}
