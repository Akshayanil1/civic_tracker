name: Frappe Tests

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      mariadb:
        image: mariadb:10.6
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=5s --health-timeout=2s --health-retries=3
      redis-cache:
        image: redis:alpine
        ports:
          - 13000:6379
      redis-queue:
        image: redis:alpine
        ports:
          - 11000:6379
          
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: Install Frappe Bench
      run: |
        pip install frappe-bench
        npm install -g yarn
        
    - name: Init Bench
      run: |
        bench init --skip-redis-config-generation test-bench
        cd test-bench
        bench get-app civic_tracker $GITHUB_WORKSPACE
        
    - name: Create Site & Install App
      run: |
        cd test-bench
        bench new-site test_site.local --db-root-password root --admin-password admin
        bench --site test_site.local install-app civic_tracker
        
    - name: Run Tests
      run: |
        cd test-bench
        bench --site test_site.local run-tests --app civic_tracker
