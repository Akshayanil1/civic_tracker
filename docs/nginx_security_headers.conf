# Day 59: Nginx Security & Rate Limiting Configuration
# Include these directives in your Frappe Nginx configuration (`/etc/nginx/conf.d/frappe.conf`)
# to harden the system against DDoS and Web vulnerabilities.

# 1. Rate Limiting Zones (Define in `http` block)
# Limits connections to 10 requests per second per IP for API endpoints
limit_req_zone $binary_remote_addr zone=civic_api_limit:10m rate=10r/s;

server {
    # ... existing frappe server block ...

    # 2. Apply Rate Limiting to Public Issue Reporting Endpoints
    location /api/method/civic_tracker.api.iot.sensor_webhook {
        limit_req zone=civic_api_limit burst=20 nodelay;
        proxy_pass http://frappe-bench-frappe;
    }
    
    location /api/method/civic_tracker.api.whatsapp.webhook_receive {
        limit_req zone=civic_api_limit burst=20 nodelay;
        proxy_pass http://frappe-bench-frappe;
    }

    # 3. Security Headers
    # Prevents Clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    # Enables Cross-Site Scripting (XSS) filter
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Prevents MIME-sniffing
    add_header X-Content-Type-Options "nosniff" always;
    
    # HTTP Strict Transport Security (HSTS)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # Content Security Policy (Basic restriction, adjust for Frappe assets)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com; style-src 'self' 'unsafe-inline' https://unpkg.com; img-src 'self' data: https://*.tile.openstreetmap.org;" always;
}
